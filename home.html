<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker</title>
  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

  <!-- tailwind + daisy -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- fonts  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <!-- font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    *{
      font-family: "Geist", sans-serif;
    }
  </style>
</head>
<body>
  <header>
    <div class="navbar bg-base-100 shadow-sm">
      <div class="flex-1">
        <img class="inline-block h-10 w-10" src="./assets/github-logo.png" alt="">
        <span class="font-semibold text-[#1F2937] text-[24px]">GitHub Issues Tracker</span>
      </div>
      <div class="flex gap-2">
        <input type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
        <div class="">
          <div class="">
            <button class="btn btn-active btn-primary">Search</button>
          </div>
        </div>
      </div>
    </div>
  </header>
  <section class="mt-15 w-[80%] mx-auto bg-[#F8FAFC]">
    <div class=" shadow-xl border-base-300 rounded-box w-full border bg-[#FFFFFF] p-4 rounded-md">
      <div class="flex space-x-4 p-4">
        <button id="allButton" data-button-type="all" class="btn btn-active bg-blue-600 text-white">
          All
        </button>
        <button id="openButton" data-button-type="open" class="btn btn-active text-gray-500">
          Open
        </button>
        <button id="closedButton" data-button-type="closed" class="btn btn-active text-gray-500">
          Closed
       </button>
      </div>
    </div>
  </section>
  <script src="./script/script.js"></script>
</body>
</html>
