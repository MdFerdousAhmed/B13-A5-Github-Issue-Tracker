<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker</title>
  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

  <!-- tailwind + daisy -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- fonts  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <!-- font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    *{
      font-family: "Geist", sans-serif;
    }
  </style>
</head>
<body>
  <header>
    <div class="navbar bg-base-100 shadow-sm">
      <div class="flex-1">
        <img class="inline-block h-10 w-10" src="./assets/github-logo.png" alt="">
        <span class="font-semibold text-[#1F2937] text-[24px]">GitHub Issues Tracker</span>
      </div>
      <div class="flex gap-2">
        <input id="input-search" type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
        <div class="">
          <div class="">
            <button id="btn-search" class="btn btn-active btn-primary">Search</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <section class="mt-15 w-11/12 mx-auto bg-[#F8FAFC]">
    <div class=" shadow-xl border-base-300 rounded-box w-full border bg-[#FFFFFF] p-4 rounded-md">
      <div class="flex space-x-4 p-4">
        <button id="allButton" data-button-type="all" class="btn btn-active bg-blue-600 text-white">
          All
        </button>
        <button id="openButton" data-button-type="open" class="btn btn-active text-gray-500">
          Open
        </button>
        <button id="closedButton" data-button-type="closed" class="btn btn-active text-gray-500">
          Closed
       </button>
      </div>
    </div>
  </section>

  <section class="mt-15 w-11/12 mx-auto bg-[#F8FAFC]">
    <div class=" shadow-xl border-base-300 rounded-box w-full border bg-[#FFFFFF] p-4 rounded-md justify-between flex">
      <div class="flex gap-4">
        <div class="p-4 bg-blue-100 rounded-full">
          <img src="./assets/Aperture.png" alt="">
        </div>
        <div>
          <h2 class="font-bold text-2xl"><span id="all">0</span>Issues</h2>
          <p class="text-[#64748B]">Track and manage your project issues</p>
        </div>
      </div>
      <div class=" flex gap-4 justify-center items-center">
        <span>
          <i class="fa-solid fa-circle text-green-500"></i>
          Open
        </span>
        <span>
          <i class="fa-solid fa-circle text-purple-500"></i>
          Closed
        </span>

      </div>
    
    </div>
  </section>
  
  <section>
    <!-- Open the modal using ID.showModal() method -->
    <button class="btn" onclick="card_modal.showModal()">open modal</button>
    <dialog id="card_modal" class="modal">
      <div class="modal-box">
        <div class="p-4 border-t-2 border-green-500 rounded-md">
          <div class="flex justify-between">
            <div>
            <img class="px-2 py-2 " src="./assets/Open-Status.png" alt="">
            </div>
            <div>
              <button class="btn btn-soft btn-error px-7 py-2 rounded-full font-semibold">${card.priority}</button>
            </div>
          </div>
          <div>
            <h2 class="font-semibold">${card.title}</h2>
            <p class="text-[#64748B]">${card.description}</p>
            <div class="flex gap-2">
              <button class="btn btn-soft btn-secondary rounded-full"><i class="fa-solid fa-bug"></i>${card.labels[0]}</button>
              <button class="btn btn-soft btn-warning rounded-full"><i class="fa-regular fa-life-ring"></i>${card.labels[1]}</button>
            
            </div>
          </div>
          <div class="w-full mt-4">
            <div class="flex-grow h-px bg-gray-300 w-full"></div>
          </div>
          <div class="space-y-2 mt-2">
            <p class="text-[#64748B]">${card.author}</p>
            <p class="text-[#64748B]">${card.createdAt}</p>
          </div>
        </div>
      
        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn">Close</button>
          </form>
        </div>
      </div>
    </dialog>
  </section>

  <section class=" bg-gray-100  w-11/12 mx-auto">
    <div id="all-container" class="grid grid-cols-2 md:grid-cols-3  p-10 shadow-lg gap-4 max-w-full mx-auto rounded-lg">

        
    </div>
    <div id="loadingSpinner" class="h-[60vh] flex hidden justify-center items-center">
      <span class="loading loading-spinner loading-xl"></span>
    </div>
  </section>
  <script src="./script/script.js"></script>
</body>
</html>
